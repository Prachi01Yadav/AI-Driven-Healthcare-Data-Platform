<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arogya 360 - AI Hospital Management</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SockJS and STOMP for WebSocket -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    
    <link rel="stylesheet" href="css/styles.css">
    <script defer src="js/api.js"></script>
    <script defer src="js/app.js"></script>
</head>
<body>

    <!-- Login Page -->
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-large">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    Arogya <span class="text-primary">360</span>
                </div>
                <p id="loginSubtitle" class="text-muted">Your AI-Powered Healthcare Management Platform</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
                <button class="tab-btn" onclick="switchAuthTab('register')">Register</button>
            </div>

            <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
                <div class="demo-hint">Demo: admin / admin123</div>
            </form>

            <form id="registerForm" class="auth-form" style="display:none" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regFullName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="regRole">
                        <option value="ADMIN">Admin</option>
                        <option value="DOCTOR">Doctor</option>
                        <option value="PATIENT">Patient</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
        </div>
    </div>

    <!-- Main Application -->
    <div id="appContainer" class="app-container" style="display:none">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <svg class="logo-icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                Arogya <span class="text-primary">360</span>
            </div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-item active" onclick="loadSection('dashboard', this)">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg></span>
                    <span class="nav-text" id="nav-dashboard">Dashboard</span>
                </a>
                <a href="#" class="nav-item" onclick="loadSection('aiAssistant', this)">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 12 2.1 7.1"></path><path d="M12 12l9.9 4.9"></path></svg></span>
                    <span class="nav-text" id="nav-aiAssistant">AI Assistant</span>
                </a>
                <a href="#" class="nav-item" onclick="loadSection('patients', this)">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg></span>
                    <span class="nav-text" id="nav-patients">Patients</span>
                </a>
                <a href="#" class="nav-item" onclick="loadSection('doctors', this)">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></span>
                    <span class="nav-text" id="nav-doctors">Doctors</span>
                </a>
                <a href="#" class="nav-item" onclick="loadSection('appointments', this)">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></span>
                    <span class="nav-text" id="nav-appointments">Appointments</span>
                </a>
                <a href="#" class="nav-item" onclick="loadSection('bills', this)">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></span>
                    <span class="nav-text" id="nav-bills">Bills</span>
                </a>
                <a href="#" class="nav-item" onclick="loadSection('prescriptions', this)">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg></span>
                    <span class="nav-text" id="nav-prescriptions">Prescriptions</span>
                </a>
                <a href="#" class="nav-item" onclick="loadSection('blockchain', this)">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg></span>
                    <span class="nav-text" id="nav-blockchain">Blockchain</span>
                </a>
                <a href="#" class="nav-item text-danger" onclick="loadSection('emergency', this)">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></span>
                    <span class="nav-text" id="nav-emergency">Emergency SOS</span>
                </a>
                <a href="#" class="nav-item" onclick="loadSection('healthAnalytics', this)">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg></span>
                    <span class="nav-text" id="nav-healthAnalytics">Health Analytics</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <button class="btn btn-outline btn-sm w-100 mb-3" onclick="toggleLanguage()">
                    Language: <span id="langToggle">EN</span>
                </button>
                <button class="btn btn-secondary btn-sm w-100" onclick="handleLogout()">Logout</button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header>
                <div class="header-left">
                    <h1 id="sectionTitle">Dashboard</h1>
                    <p id="sectionSubtitle" class="subtitle">Overview of your hospital</p>
                </div>
                <div class="header-right">
                    <div class="notification-bell" id="notifBell" onclick="toggleNotifications()">
                        <span class="bell-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></span>
                        <span class="badge" id="notifBadge" style="display:none">0</span>
                        <div class="notif-dropdown" id="notifDropdown" style="display:none">
                            <div class="notif-header">Notifications</div>
                            <div class="notif-list" id="notifList"></div>
                        </div>
                    </div>
                    <div class="user-info">
                        <span id="userName">Admin</span>
                        <span id="userRole" class="role-badge">ADMIN</span>
                    </div>
                </div>
            </header>
            
            <section id="contentArea" class="content-area">
                <!-- Content will be injected here via JS -->
            </section>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Modal Container -->
    <div id="modalOverlay" class="modal-overlay" style="display:none">
        <div class="modal" id="modalContent">
            <!-- Modal content injected via JS -->
        </div>
    </div>

</body>
</html>
