spring.application.name=Arogya360

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hospital_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Server port
server.port=${PORT:8081}

# Spring AI Configuration (Using Groq for free fast inference)
spring.ai.openai.api-key=${GROQ_API_KEY:disabled}
spring.ai.openai.base-url=https://api.groq.com/openai/v1
spring.ai.openai.chat.options.model=llama3-8b-8192

# JWT Configuration
app.jwt.secret=${JWT_SECRET:arogya360-super-secret-key-change-in-production-2024-v2}
app.jwt.expiration-ms=86400000
